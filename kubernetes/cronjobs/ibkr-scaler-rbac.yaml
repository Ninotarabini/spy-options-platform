apiVersion: v1
kind: ServiceAccount
metadata:
  name: ibkr-scaler
  namespace: spy-options-bot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ibkr-scaler-role
  namespace: spy-options-bot
rules:
- apiGroups: ["apps"]
  resources: ["statefulsets", "statefulsets/scale"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ibkr-scaler-binding
  namespace: spy-options-bot
subjects:
- kind: ServiceAccount
  name: ibkr-scaler
  namespace: spy-options-bot
roleRef:
  kind: Role
  name: ibkr-scaler-role
  apiGroup: rbac.authorization.k8s.io
