apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: spy-options-bot
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "2000"
    traefik.ingress.kubernetes.io/service.timeout: 300s
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /spymarket
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /flow
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /anomalies
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /volumes
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /negotiate
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
